    - name: Static build tcpdump
      run: |
        # Set toolchain
        export CROSS_COMPILE=${{ env.GCC_PREFIX }}-
        export PATH=${{ env.TOOLCHAIN_PATH }}/bin:$PATH
        CC=${{ env.TOOLCHAIN_PATH }}/bin/${{ env.GCC_PREFIX }}-gcc
        AR=${{ env.TOOLCHAIN_PATH }}/bin/${{ env.GCC_PREFIX }}-ar
        
        # Build libpcap first
        LIBPCAP_VERSION=1.10.4
        cd /tmp
        wget -q https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz
        tar -xzf libpcap-${LIBPCAP_VERSION}.tar.gz
        cd libpcap-${LIBPCAP_VERSION}
        
        # Configure libpcap for static build (minimal features)
        CC=$CC AR=$AR \
        ./configure \
          --host=arm-linux \
          --prefix=/tmp/libpcap-install \
          --disable-shared \
          --disable-dbus \
          --disable-rdma \
          --without-libnl \
          --without-dpdk \
          --without-snf \
          --without-dag \
          --without-septel \
          ac_cv_prog_cc_c99=-std=gnu99 \
          CFLAGS="-mfloat-abi=soft -Os -std=gnu99" \
          LDFLAGS="-static"
        
        make -j$(nproc)
        make install
        
        # Build tcpdump
        TCPDUMP_VERSION=4.99.4
        cd /tmp
        wget -q https://www.tcpdump.org/release/tcpdump-${TCPDUMP_VERSION}.tar.gz
        tar -xzf tcpdump-${TCPDUMP_VERSION}.tar.gz
        cd tcpdump-${TCPDUMP_VERSION}
        
        # Configure tcpdump with minimal features
        CC=$CC \
        ./configure \
          --host=arm-linux \
          --prefix=/tmp/tcpdump-install \
          --with-pcap=/tmp/libpcap-install \
          --disable-shared \
          --enable-static \
          --without-crypto \
          --without-sandbox-capsicum \
          --without-sandbox-pledge \
          --without-sandbox-chroot \
          --without-sandbox-rlimit \
          --disable-smb \
          --disable-smrsh \
          --disable-localpcap \
          --disable-usb \
          --disable-bluetooth \
          CFLAGS="-mfloat-abi=soft -Os" \
          LDFLAGS="-static"
        
        make -j$(nproc)
        make install
        
        # Strip binary
        ${{ env.TOOLCHAIN_PATH }}/bin/${{ env.GCC_PREFIX }}-strip /tmp/tcpdump-install/bin/tcpdump
        
        # Copy to workspace
        cp /tmp/tcpdump-install/bin/tcpdump ${{ github.workspace }}/tcpdump-static
        
        echo "=== tcpdump static binary info ==="
        file ${{ github.workspace }}/tcpdump-static
        ${{ env.TOOLCHAIN_PATH }}/bin/${{ env.GCC_PREFIX }}-readelf -d ${{ github.workspace }}/tcpdump-static | grep NEEDED || echo "No dynamic dependencies - fully static!"
        
    - name: Copy adbd from buildroot output
      run: |
        STRIP=${{ env.TOOLCHAIN_PATH }}/bin/${{ env.GCC_PREFIX }}-strip
        
        # Copy adbd from buildroot output
        if [ -f ~/buildroot-${{ env.BUILDROOT_VERSION }}/output/target/usr/bin/adbd ]; then
          cp ~/buildroot-${{ env.BUILDROOT_VERSION }}/output/target/usr/bin/adbd ${{ github.workspace }}/adbd
          $STRIP ${{ github.workspace }}/adbd 2>/dev/null || true
          echo "=== adbd binary info ==="
          file ${{ github.workspace }}/adbd
          ${{ env.TOOLCHAIN_PATH }}/bin/${{ env.GCC_PREFIX }}-readelf -d ${{ github.workspace }}/adbd | grep NEEDED || echo "No dynamic dependencies!"
        else
          echo "Warning: adbd not found in buildroot output"
          ls -la ~/buildroot-${{ env.BUILDROOT_VERSION }}/output/target/usr/bin/ 2>/dev/null | head -20 || true
          exit 1
        fi
        
    - name: Check binary info
      run: |
        
        echo "=== busybox (swapon) binary info ==="
        file busybox
        readelf -h busybox | head -20
        
        echo "=== tcpdump-static binary info ==="
        file tcpdump-static
        readelf -h tcpdump-static | head -20
        
        if [ -f adbd ]; then
          echo "=== adbd binary info ==="
          file adbd
          readelf -h adbd | head -20
        fi
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: arm-binaries-dlopen
        if-no-files-found: warn
        path: |
          busybox
          swapon
          swapoff
          mkswap
          tcpdump-static
          curl-static
          adbd
