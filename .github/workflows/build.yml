name: Build Demos with Buildroot Toolchain

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      BUILDROOT_VERSION: 2024.02.1
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          wget \
          tar \
          cpio \
          unzip \
          rsync \
          bc \
          libncurses5-dev \
          libncursesw5-dev \
          file \
          python3
        
    - name: Cache buildroot toolchain
      uses: actions/cache@v4
      id: buildroot-cache
      with:
        path: ~/buildroot-${{ env.BUILDROOT_VERSION }}
        key: buildroot-${{ env.BUILDROOT_VERSION }}-armv7-musl-softfloat-v1.2-minimal
        
    - name: Download and extract buildroot
      if: steps.buildroot-cache.outputs.cache-hit != 'true'
      run: |
        cd ~
        wget -q https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.xz
        tar -xf buildroot-*.tar.xz
        
        # Copy minimal adbd patches to buildroot package directory
        cp  ${{ github.workspace }}/0014-adbd-pthread.patch \
          ~/buildroot-${BUILDROOT_VERSION}/package/android-tools/
        
    - name: Configure buildroot for ARMv7 + musl + soft-float
      if: steps.buildroot-cache.outputs.cache-hit != 'true'
      run: |
        cd ~/buildroot-${BUILDROOT_VERSION}
        
        # Create config for ARMv7 soft-float + musl (memory optimized)
        cat > .config << 'EOF'
        # Target Architecture
        BR2_arm=y
        BR2_cortex_a7=y
        
        # Soft float (no VFP, no hard float)
        BR2_ARM_SOFT_FLOAT=y
        BR2_ARM_EABI=y
        BR2_ARM_INSTRUCTIONS_ARM=y
        
        # Use musl (more lightweight than uClibc)
        BR2_TOOLCHAIN_BUILDROOT_MUSL=y
        BR2_KERNEL_HEADERS_5_10=y
        BR2_BINUTILS_VERSION_2_40_X=y
        BR2_GCC_VERSION_12_X=y
        
        # Memory optimization flags (minimal adbd: disable push/pull with -DADBD_MINIMAL)
        BR2_TARGET_OPTIMIZATION="-Os -ffunction-sections -fdata-sections -fomit-frame-pointer -DADBD_MINIMAL"
        BR2_TARGET_LDFLAGS="-Wl,--gc-sections -Wl,--strip-all"
        
        # Don't build target packages, just toolchain
        BR2_INIT_NONE=y
        BR2_SYSTEM_BIN_SH_NONE=y
        BR2_PACKAGE_BUSYBOX=n
        BR2_TARGET_ROOTFS_CPIO=n
        BR2_TARGET_ROOTFS_EXT2=n
        BR2_TARGET_ROOTFS_INITRAMFS=n
        BR2_TARGET_ROOTFS_TAR=n
        
        # Enable toolchain only build
        BR2_TOOLCHAIN=y
        
        # Enable adbd with static linking (minimal features)
        BR2_STATIC_LIBS=y
        BR2_PACKAGE_ANDROID_TOOLS=y
        BR2_PACKAGE_ANDROID_TOOLS_ADBD=y
        BR2_PACKAGE_ANDROID_TOOLS_ADBD_MAKE_OPTS="ADBD_MINIMAL=1"
        BR2_PACKAGE_OPENSSL=y
        
        EOF
        
        make olddefconfig
        
    # - name: Add post-extract hook to override adbd.mk
    #   if: steps.buildroot-cache.outputs.cache-hit != 'true'
    #   run: |
    #     cd ~/buildroot-${BUILDROOT_VERSION}
        
    - name: Build toolchain and adbd (this may take 20-40 minutes)
      if: steps.buildroot-cache.outputs.cache-hit != 'true'
      run: |
        cd ~/buildroot-${BUILDROOT_VERSION}
        make toolchain android-tools -j$(nproc)
        
        # Check if adbd was built
        if [ -f ~/buildroot-${BUILDROOT_VERSION}/output/target/usr/bin/adbd ]; then
          echo "=== adbd built successfully ==="
          file ~/buildroot-${BUILDROOT_VERSION}/output/target/usr/bin/adbd
        else
          echo "Warning: adbd binary not found in output"
          ls -la ~/buildroot-${BUILDROOT_VERSION}/output/target/usr/bin/ 2>/dev/null | head -20 || true
        fi
        
    - name: Setup toolchain environment
      run: |
        TOOLCHAIN_PATH=~/buildroot-${BUILDROOT_VERSION}/output/host
        echo "TOOLCHAIN_PATH=$TOOLCHAIN_PATH" >> $GITHUB_ENV
        echo "$TOOLCHAIN_PATH/bin" >> $GITHUB_PATH
        
        # Find the actual gcc binary
        GCC_BIN=$(ls $TOOLCHAIN_PATH/bin/arm*-linux-*-gcc | head -1)
        GCC_PREFIX=$(basename $GCC_BIN | sed 's/-gcc$//')
        echo "GCC_PREFIX=$GCC_PREFIX" >> $GITHUB_ENV
        echo "Found toolchain: $GCC_PREFIX"
        $GCC_BIN --version
        
    - name: Verify toolchain float type
      run: |
        GCC_BIN=${{ env.TOOLCHAIN_PATH }}/bin/${{ env.GCC_PREFIX }}-gcc
        echo "Checking toolchain configuration..."
        $GCC_BIN -dumpmachine
        
